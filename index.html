<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />

    <title>%VITE_TITLE%</title>
    <meta name="title" content="%VITE_TITLE%" />
    <meta name="description" content="%VITE_DESCRIPTION%" />
    <meta name="keywords" content="gut microbiome, metagenomics, microbiota, 16S rRNA, MetaPhlAn, differential abundance, PCoA, Shannon diversity, gut bacteria, human microbiome atlas" />
    <meta name="author" content="Gut Microbiome Atlas Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="%VITE_URL%" />

    <!-- Open Graph / 社交分享 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%VITE_TITLE%" />
    <meta property="og:description" content="%VITE_DESCRIPTION%" />
    <meta property="og:url" content="%VITE_URL%" />
    <meta property="og:site_name" content="%VITE_TITLE%" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_TITLE%" />
    <meta name="twitter:description" content="%VITE_DESCRIPTION%" />

    <!-- Theme color / 主题色 -->
    <meta name="theme-color" content="#101829" />

    <!-- Structured data / 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Gut Microbiome Atlas",
      "description": "A comprehensive platform for exploring human gut microbiome across 168,000+ samples, 69 countries, 217+ diseases, and 8 life stages.",
      "url": "https://compendiumwebsite.vercel.app",
      "keywords": ["gut microbiome", "metagenomics", "16S rRNA", "microbiota", "human microbiome atlas"],
      "creator": {
        "@type": "Organization",
        "name": "Department of Gastroenterology, The First Affiliated Hospital of China Medical University",
        "url": "https://www.cmu.edu.cn"
      },
      "license": "https://creativecommons.org/licenses/by-nc/4.0/",
      "temporalCoverage": "2025/2026",
      "variableMeasured": ["microbial abundance", "taxonomic composition", "alpha diversity", "beta diversity"]
    }
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;color:#e4e8ee;background:#101829;min-height:100vh">
        <h1>Gut Microbiome Atlas</h1>
        <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        <p>本应用需要启用 JavaScript。请在浏览器设置中开启 JavaScript。</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
