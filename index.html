<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />

    <title>Gut Microbiome Atlas</title>
    <meta name="title" content="Gut Microbiome Atlas" />
    <meta name="description" content="Interactive exploration of 168,000+ human gut microbiome samples across age, sex, and disease dimensions." />
    <meta name="keywords" content="gut microbiome, metagenomics, microbiota, 16S rRNA, MetaPhlAn, differential abundance, PCoA, Shannon diversity, gut bacteria, human microbiome atlas" />
    <meta name="author" content="Gut Microbiome Atlas Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://compendiumwebsite.vercel.app" />

    <!-- Open Graph / 社交分享 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gut Microbiome Atlas" />
    <meta property="og:description" content="Interactive exploration of 168,000+ human gut microbiome samples across age, sex, and disease dimensions." />
    <meta property="og:url" content="https://compendiumwebsite.vercel.app" />
    <meta property="og:site_name" content="Gut Microbiome Atlas" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gut Microbiome Atlas" />
    <meta name="twitter:description" content="Interactive exploration of 168,000+ human gut microbiome samples across age, sex, and disease dimensions." />

    <!-- Theme color / 主题色 -->
    <meta name="theme-color" content="#101829" />

    <!-- Structured data / 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Gut Microbiome Atlas",
      "description": "An analytical platform for 168,464 human gut microbiome samples spanning 4,680 genera, 72 countries, and 224 condition categories, including one NC control category, across 8 life stages. Features differential analysis, cross-study meta-analysis, GMHI health index, lifecycle atlas, and species profiling.",
      "url": "https://compendiumwebsite.vercel.app",
      "keywords": ["gut microbiome", "metagenomics", "16S rRNA", "microbiota", "human microbiome atlas", "GMHI", "cross-study meta-analysis"],
      "creator": {
        "@type": "Organization",
        "name": "Department of Gastroenterology, The First Affiliated Hospital of China Medical University",
        "url": "https://www.cmu.edu.cn"
      },
      "license": "https://opensource.org/licenses/MIT",
      "temporalCoverage": "2015-01-01/2026-04-04",
      "spatialCoverage": {
        "@type": "Place",
        "name": "72 countries globally"
      },
      "distribution": {
        "@type": "DataDownload",
        "contentUrl": "https://compendiumwebsite.vercel.app/download",
        "encodingFormat": "CSV"
      },
      "variableMeasured": [
        "microbial relative abundance",
        "taxonomic composition (genus and phylum level)",
        "alpha diversity (Shannon, Simpson)",
        "beta diversity (Bray-Curtis PCoA)",
        "differential abundance (log2FC, effect size)",
        "gut microbiome health index (GMHI)"
      ],
      "measurementTechnique": "16S rRNA gene amplicon sequencing (DADA2 + SILVA 138.1 taxonomic profiling)",
      "isAccessibleForFree": true
    }
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;color:#e4e8ee;background:#101829;min-height:100vh">
        <h1>Gut Microbiome Atlas</h1>
        <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        <p>本应用需要启用 JavaScript。请在浏览器设置中开启 JavaScript。</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
