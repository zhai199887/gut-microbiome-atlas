<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring (gut shape) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="16" opacity="0.3"/>
  <!-- Stylized intestine path -->
  <path d="M160 200 Q200 140 256 160 Q320 180 300 240 Q280 300 220 280 Q160 260 200 320 Q240 380 310 340"
        fill="none" stroke="#e040fb" stroke-width="14" stroke-linecap="round" opacity="0.8"/>
  <!-- Microbe dots -->
  <circle cx="220" cy="180" r="12" fill="#4ecdc4" opacity="0.9"/>
  <circle cx="300" cy="210" r="10" fill="#4ecdc4" opacity="0.7"/>
  <circle cx="240" cy="260" r="8" fill="#4ecdc4" opacity="0.8"/>
  <circle cx="190" cy="310" r="11" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="270" cy="340" r="9" fill="#4ecdc4" opacity="0.9"/>
  <circle cx="320" cy="280" r="7" fill="#4ecdc4" opacity="0.5"/>
  <!-- GMA text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="8">GMA</text>
</svg>
