<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" id="logo" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Gut Microbiome Atlas</title>
  <desc id="logo-desc">A circular emblem with a ZW-shaped intestinal tract with villi and microbial colonies</desc>

  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="currentColor" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gut-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.6"/>
    </linearGradient>
    <!-- 裁剪到圆圈内 -->
    <clipPath id="circle-clip">
      <circle cx="0" cy="0" r="42"/>
    </clipPath>
  </defs>

  <!-- 外圈 — 双层学术徽章 -->
  <circle cx="0" cy="0" r="47" fill="none" stroke="url(#ring-grad)" stroke-width="1.2"/>
  <circle cx="0" cy="0" r="44" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>

  <!-- 经纬线 — Atlas 地球仪暗示 -->
  <ellipse cx="0" cy="0" rx="24" ry="42" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.18"/>
  <ellipse cx="0" cy="0" rx="42" ry="16" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.15" transform="rotate(-15)"/>
  <ellipse cx="0" cy="0" rx="38" ry="10" fill="none" stroke="currentColor" stroke-width="0.4" opacity="0.12" transform="rotate(20)"/>

  <!-- 所有内容裁剪到圆圈内 -->
  <g clip-path="url(#circle-clip)">

    <!-- ZW 形肠道 — 收缩到圆内，3个弯 -->
    <path
      fill="none"
      stroke="url(#gut-grad)"
      stroke-width="6.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="
        M 14,-30
        C 4,-32 -6,-28 -12,-22
        C -18,-16 -12,-8 0,-6
        C 12,-4 22,0 24,8
        C 26,16 16,20 4,24
        C -8,28 -16,30 -16,34
        C -16,37 -8,38 0,37
        C 8,36 18,34 24,37
      "
    />

    <!-- 内壁轮廓 — 增加立体感 -->
    <path
      fill="none"
      stroke="currentColor"
      stroke-width="0.7"
      stroke-linecap="round"
      opacity="0.15"
      d="
        M 12,-26
        C 4,-28 -2,-25 -7,-20
        C -12,-15 -8,-10 2,-8
        C 12,-6 18,0 20,6
        C 22,12 14,16 4,20
        C -6,24 -12,26 -12,30
        C -12,33 -6,34 0,33
        C 6,32 14,31 20,33
      "
    />

    <!-- 绒毛 — 适量，沿肠道外侧的短线 -->
    <g stroke="currentColor" stroke-width="0.9" opacity="0.3" stroke-linecap="round">
      <!-- 顶段外侧 -->
      <line x1="10" y1="-32" x2="10" y2="-38"/>
      <line x1="2" y1="-30" x2="-1" y2="-36"/>
      <line x1="-8" y1="-26" x2="-12" y2="-31"/>
      <line x1="-16" y1="-18" x2="-22" y2="-19"/>

      <!-- 顶段内侧 -->
      <line x1="8" y1="-27" x2="7" y2="-22"/>
      <line x1="-2" y1="-25" x2="-4" y2="-20"/>

      <!-- 中上段外侧 -->
      <line x1="-14" y1="-12" x2="-20" y2="-13"/>
      <line x1="-4" y1="-7" x2="-7" y2="-13"/>
      <line x1="8" y1="-4" x2="8" y2="-10"/>
      <line x1="18" y1="-1" x2="21" y2="-7"/>

      <!-- 中上段内侧 -->
      <line x1="-6" y1="-5" x2="-8" y2="1"/>
      <line x1="4" y1="-3" x2="4" y2="3"/>
      <line x1="14" y1="1" x2="17" y2="6"/>

      <!-- 中下段外侧 -->
      <line x1="26" y1="10" x2="32" y2="10"/>
      <line x1="20" y1="18" x2="24" y2="23"/>
      <line x1="8" y1="24" x2="10" y2="30"/>
      <line x1="-2" y1="27" x2="-4" y2="33"/>
      <line x1="-12" y1="30" x2="-16" y2="35"/>

      <!-- 中下段内侧 -->
      <line x1="20" y1="11" x2="16" y2="15"/>
      <line x1="8" y1="19" x2="2" y2="18"/>
      <line x1="-4" y1="24" x2="-10" y2="22"/>

      <!-- 底段外侧 -->
      <line x1="-12" y1="36" x2="-14" y2="41"/>
      <line x1="-2" y1="38" x2="-2" y2="43"/>
      <line x1="10" y1="37" x2="13" y2="42"/>
      <line x1="22" y1="36" x2="26" y2="40"/>

      <!-- 底段内侧 -->
      <line x1="-8" y1="33" x2="-4" y2="29"/>
      <line x1="4" y1="34" x2="8" y2="30"/>
    </g>

    <!-- 微生物菌落 — 球菌沿肠道 -->
    <circle cx="2" cy="-28" r="2.2" fill="currentColor" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.35;0.55" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-6" cy="-10" r="2.0" fill="currentColor" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="4" r="2.4" fill="currentColor" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.4;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-2" cy="22" r="2.0" fill="currentColor" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.32;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="36" r="1.8" fill="currentColor" opacity="0.45"/>

    <!-- 杆菌 -->
    <rect x="6" y="-18" width="4.5" height="1.4" rx="0.7" fill="currentColor" opacity="0.35" transform="rotate(22, 8.25, -17.3)"/>
    <rect x="-4" y="8" width="4" height="1.3" rx="0.65" fill="currentColor" opacity="0.3" transform="rotate(-18, -2, 8.65)"/>

    <!-- 菌群网络连线 -->
    <g opacity="0.1" stroke="currentColor" stroke-width="0.4">
      <line x1="2" y1="-28" x2="-6" y2="-10"/>
      <line x1="-6" y1="-10" x2="16" y2="4"/>
      <line x1="16" y1="4" x2="-2" y2="22"/>
      <line x1="-2" y1="22" x2="12" y2="36"/>
    </g>

    <!-- 散布微粒 -->
    <circle cx="30" cy="-14" r="1.0" fill="currentColor" opacity="0.1"/>
    <circle cx="-28" cy="8" r="1.1" fill="currentColor" opacity="0.08"/>
    <circle cx="28" cy="24" r="0.8" fill="currentColor" opacity="0.07"/>
    <circle cx="-24" cy="-18" r="0.9" fill="currentColor" opacity="0.09"/>

  </g>

  <!-- 底部装饰弧（在 clip 外） -->
  <path d="M -30 38 Q 0 46, 30 38" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
</svg>
