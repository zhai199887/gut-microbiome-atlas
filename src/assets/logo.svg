<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" id="logo" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Gut Microbiome Atlas</title>
  <desc id="logo-desc">A circular emblem depicting a stylized intestinal tract with microbial colonies and a DNA double helix, representing the human gut microbiome atlas</desc>

  <defs>
    <!-- Gradient for outer ring -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="currentColor" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Gradient for intestine -->
    <linearGradient id="gut-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <!-- 外圈 — 双层学术徽章风格 -->
  <circle cx="0" cy="0" r="47" fill="none" stroke="url(#ring-grad)" stroke-width="1.2"/>
  <circle cx="0" cy="0" r="44" fill="none" stroke="currentColor" stroke-width="2.8" opacity="0.55"/>
  <circle cx="0" cy="0" r="41" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>

  <!-- 经度弧线 — Atlas 地球仪暗示 -->
  <ellipse cx="0" cy="0" rx="25" ry="44" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
  <ellipse cx="0" cy="0" rx="44" ry="18" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.08" transform="rotate(-20)"/>

  <!-- DNA 双螺旋 — 左侧装饰 -->
  <g opacity="0.3" transform="translate(-30, 0) rotate(-8)">
    <!-- 链1 -->
    <path d="M 0,-28 Q 5,-21 0,-14 Q -5,-7 0,0 Q 5,7 0,14 Q -5,21 0,28"
      fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 链2 -->
    <path d="M 0,-28 Q -5,-21 0,-14 Q 5,-7 0,0 Q -5,7 0,14 Q 5,21 0,28"
      fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 碱基对横杠 -->
    <line x1="-3.5" y1="-24.5" x2="3.5" y2="-24.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4.5" y1="-17.5" x2="4.5" y2="-17.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-3.5" y1="-10.5" x2="3.5" y2="-10.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4.5" y1="-3.5" x2="4.5" y2="-3.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-3.5" y1="3.5" x2="3.5" y2="3.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4.5" y1="10.5" x2="4.5" y2="10.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-3.5" y1="17.5" x2="3.5" y2="17.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <line x1="-4.5" y1="24.5" x2="4.5" y2="24.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- 肠道轮廓 — 解剖学简化结肠 (升结肠→横结肠→降结肠) -->
  <path
    fill="none"
    stroke="url(#gut-grad)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="
      M 12 34
      C 12 26, 14 20, 14 12
      C 14 4, 15 -2, 14 -8
      L 14 -16
      C 14 -24, 8 -28, 0 -28
      C -8 -28, -14 -24, -14 -16
      L -14 -8
      C -15 -2, -14 4, -14 12
      C -14 20, -12 26, -12 34
    "
  />

  <!-- 肠壁内层 — 绒毛纹理 -->
  <path fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.18"
    d="M 9 30 C 9 24, 10 18, 10 12 C 10 6, 10.5 0, 10 -6 L 10 -14 C 10 -20, 6 -23, 0 -23 C -6 -23, -10 -20, -10 -14 L -10 -6 C -10.5 0, -10 6, -10 12 C -10 18, -9 24, -9 30"/>

  <!-- 微生物菌落 — 球菌 (Cocci) 沿肠道分布 -->
  <circle cx="-3" cy="-20" r="2.5" fill="currentColor" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.5;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="5" cy="-14" r="1.8" fill="currentColor" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.35;0.55" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-6" cy="-8" r="2.2" fill="currentColor" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.4;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="7" cy="-2" r="1.5" fill="currentColor" opacity="0.45"/>
  <circle cx="-2" cy="4" r="2.4" fill="currentColor" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.4;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="5" cy="12" r="1.6" fill="currentColor" opacity="0.5"/>
  <circle cx="-5" cy="18" r="2.0" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="2" cy="26" r="1.3" fill="currentColor" opacity="0.4"/>

  <!-- 微生物菌落 — 杆菌 (Bacilli) -->
  <rect x="-1" y="-12" width="5" height="1.6" rx="0.8" fill="currentColor" opacity="0.45" transform="rotate(20, 1.5, -11.2)"/>
  <rect x="1" y="8" width="4" height="1.4" rx="0.7" fill="currentColor" opacity="0.4" transform="rotate(-25, 3, 8.7)"/>
  <rect x="-7" y="6" width="3.5" height="1.3" rx="0.65" fill="currentColor" opacity="0.35" transform="rotate(12, -5.25, 6.65)"/>

  <!-- 散布微生物 — 肠道外环境暗示 -->
  <circle cx="26" cy="-16" r="1.2" fill="currentColor" opacity="0.15"/>
  <circle cx="-22" cy="12" r="1.5" fill="currentColor" opacity="0.12"/>
  <circle cx="30" cy="10" r="0.9" fill="currentColor" opacity="0.1"/>
  <circle cx="-18" cy="-22" r="1.1" fill="currentColor" opacity="0.14"/>
  <circle cx="22" cy="24" r="1.3" fill="currentColor" opacity="0.12"/>

  <!-- 菌群网络连线 — 共生关系 -->
  <g opacity="0.12" stroke="currentColor" stroke-width="0.4">
    <line x1="-3" y1="-20" x2="5" y2="-14"/>
    <line x1="5" y1="-14" x2="-6" y2="-8"/>
    <line x1="-6" y1="-8" x2="7" y2="-2"/>
    <line x1="7" y1="-2" x2="-2" y2="4"/>
    <line x1="-2" y1="4" x2="5" y2="12"/>
    <line x1="5" y1="12" x2="-5" y2="18"/>
  </g>

  <!-- 底部装饰弧 — 学术 seal 风格 -->
  <path d="M -32 38 Q 0 48, 32 38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.15"/>
</svg>
