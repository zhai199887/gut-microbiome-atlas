<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" id="logo" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Gut Microbiome Atlas</title>
  <desc id="logo-desc">A circular emblem with a ZW-shaped intestinal tract decorated with villi and microbial colonies</desc>

  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="currentColor" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gut-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <!-- 外圈 — 双层学术徽章 -->
  <circle cx="0" cy="0" r="47" fill="none" stroke="url(#ring-grad)" stroke-width="1.2"/>
  <circle cx="0" cy="0" r="44" fill="none" stroke="currentColor" stroke-width="2.8" opacity="0.55"/>
  <circle cx="0" cy="0" r="41" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.2"/>

  <!-- 经度弧线 — Atlas 暗示 -->
  <ellipse cx="0" cy="0" rx="25" ry="44" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
  <ellipse cx="0" cy="0" rx="44" ry="18" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.08" transform="rotate(-20)"/>

  <!-- ZW 形肠道主体 — 贝塞尔曲线 S+Z 造型 -->
  <path
    fill="none"
    stroke="url(#gut-grad)"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="
      M 22,-36
      C 12,-38 -2,-36 -10,-30
      C -18,-24 -14,-16 -4,-13
      C 8,-10 22,-8 28,-2
      C 34,4 28,12 18,16
      C 8,20 -8,22 -16,26
      C -24,30 -22,36 -14,38
      C -6,40 6,38 16,36
      C 24,34 28,36 30,40
    "
  />

  <!-- 绒毛 — 沿肠道两侧的短线 -->
  <g stroke="currentColor" stroke-width="0.8" opacity="0.35" stroke-linecap="round">
    <!-- 顶部段绒毛 -->
    <line x1="20" y1="-38" x2="20" y2="-44"/>
    <line x1="14" y1="-38" x2="13" y2="-44"/>
    <line x1="8" y1="-37" x2="6" y2="-43"/>
    <line x1="2" y1="-37" x2="-1" y2="-43"/>
    <line x1="-4" y1="-35" x2="-8" y2="-40"/>
    <line x1="-10" y1="-32" x2="-15" y2="-36"/>
    <!-- 内侧 -->
    <line x1="18" y1="-34" x2="18" y2="-28"/>
    <line x1="12" y1="-34" x2="11" y2="-28"/>
    <line x1="6" y1="-33" x2="4" y2="-27"/>
    <line x1="0" y1="-32" x2="-2" y2="-26"/>
    <line x1="-6" y1="-30" x2="-8" y2="-24"/>
    <line x1="-12" y1="-27" x2="-12" y2="-21"/>

    <!-- 中上段绒毛 -->
    <line x1="-16" y1="-18" x2="-22" y2="-20"/>
    <line x1="-12" y1="-15" x2="-18" y2="-18"/>
    <line x1="-6" y1="-14" x2="-10" y2="-20"/>
    <line x1="0" y1="-12" x2="-3" y2="-18"/>
    <line x1="6" y1="-11" x2="4" y2="-17"/>
    <line x1="12" y1="-10" x2="12" y2="-16"/>
    <line x1="18" y1="-8" x2="20" y2="-14"/>
    <line x1="24" y1="-5" x2="28" y2="-10"/>
    <!-- 内侧 -->
    <line x1="-10" y1="-12" x2="-14" y2="-6"/>
    <line x1="-4" y1="-10" x2="-6" y2="-4"/>
    <line x1="2" y1="-9" x2="1" y2="-3"/>
    <line x1="8" y1="-8" x2="8" y2="-2"/>
    <line x1="14" y1="-6" x2="16" y2="0"/>
    <line x1="20" y1="-4" x2="24" y2="2"/>

    <!-- 中下段绒毛 -->
    <line x1="30" y1="0" x2="36" y2="-2"/>
    <line x1="30" y1="5" x2="36" y2="5"/>
    <line x1="28" y1="10" x2="34" y2="12"/>
    <line x1="24" y1="14" x2="30" y2="18"/>
    <line x1="18" y1="18" x2="22" y2="24"/>
    <line x1="12" y1="20" x2="14" y2="26"/>
    <line x1="6" y1="22" x2="6" y2="28"/>
    <line x1="0" y1="23" x2="-2" y2="29"/>
    <line x1="-6" y1="24" x2="-10" y2="30"/>
    <line x1="-12" y1="26" x2="-18" y2="30"/>
    <!-- 内侧 -->
    <line x1="26" y1="2" x2="22" y2="8"/>
    <line x1="24" y1="8" x2="18" y2="12"/>
    <line x1="20" y1="12" x2="14" y2="14"/>
    <line x1="14" y1="16" x2="8" y2="16"/>
    <line x1="8" y1="18" x2="2" y2="16"/>
    <line x1="2" y1="19" x2="-4" y2="16"/>
    <line x1="-4" y1="20" x2="-10" y2="18"/>
    <line x1="-10" y1="22" x2="-16" y2="20"/>

    <!-- 底部段绒毛 -->
    <line x1="-20" y1="30" x2="-26" y2="32"/>
    <line x1="-18" y1="34" x2="-24" y2="38"/>
    <line x1="-12" y1="38" x2="-14" y2="44"/>
    <line x1="-6" y1="40" x2="-6" y2="46"/>
    <line x1="0" y1="39" x2="0" y2="45"/>
    <line x1="6" y1="38" x2="8" y2="44"/>
    <line x1="12" y1="37" x2="16" y2="42"/>
    <line x1="18" y1="36" x2="22" y2="40"/>
    <line x1="24" y1="35" x2="28" y2="38"/>
    <line x1="28" y1="37" x2="32" y2="40"/>
    <!-- 内侧 -->
    <line x1="-18" y1="28" x2="-16" y2="22"/>
    <line x1="-14" y1="32" x2="-10" y2="28"/>
    <line x1="-8" y1="34" x2="-4" y2="30"/>
    <line x1="-2" y1="35" x2="2" y2="31"/>
    <line x1="4" y1="34" x2="8" y2="30"/>
    <line x1="10" y1="34" x2="14" y2="30"/>
    <line x1="16" y1="33" x2="20" y2="30"/>
    <line x1="22" y1="33" x2="26" y2="30"/>
  </g>

  <!-- 微生物菌落 — 沿 ZW 肠道分布的球菌 -->
  <circle cx="10" cy="-35" r="2.2" fill="currentColor" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.4;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-8" cy="-14" r="2.5" fill="currentColor" opacity="0.65">
    <animate attributeName="opacity" values="0.65;0.4;0.65" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="-3" r="2.0" fill="currentColor" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.35;0.55" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="6" cy="16" r="2.3" fill="currentColor" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.38;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-14" cy="32" r="2.0" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="36" r="1.8" fill="currentColor" opacity="0.45"/>

  <!-- 杆菌点缀 -->
  <rect x="14" y="-22" width="5" height="1.5" rx="0.75" fill="currentColor" opacity="0.4" transform="rotate(25, 16.5, -21.2)"/>
  <rect x="-6" y="6" width="4.5" height="1.4" rx="0.7" fill="currentColor" opacity="0.35" transform="rotate(-20, -3.75, 6.7)"/>
  <rect x="22" y="22" width="4" height="1.3" rx="0.65" fill="currentColor" opacity="0.3" transform="rotate(15, 24, 22.65)"/>

  <!-- 散布微生物 — 肠道外 -->
  <circle cx="32" cy="-20" r="1.2" fill="currentColor" opacity="0.12"/>
  <circle cx="-30" cy="8" r="1.4" fill="currentColor" opacity="0.1"/>
  <circle cx="35" cy="15" r="0.9" fill="currentColor" opacity="0.08"/>
  <circle cx="-28" cy="-18" r="1.0" fill="currentColor" opacity="0.1"/>

  <!-- 菌群网络连线 — 共生关系 -->
  <g opacity="0.1" stroke="currentColor" stroke-width="0.4">
    <line x1="10" y1="-35" x2="-8" y2="-14"/>
    <line x1="-8" y1="-14" x2="20" y2="-3"/>
    <line x1="20" y1="-3" x2="6" y2="16"/>
    <line x1="6" y1="16" x2="-14" y2="32"/>
    <line x1="-14" y1="32" x2="18" y2="36"/>
  </g>

  <!-- 底部装饰弧 -->
  <path d="M -32 38 Q 0 48, 32 38" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.15"/>
</svg>
