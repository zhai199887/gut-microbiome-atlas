<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" id="logo">
  <!-- 外圈 — Atlas 地球仪风格 -->
  <circle cx="0" cy="0" r="46" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.35"/>
  <circle cx="0" cy="0" r="43" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6"/>

  <!-- 经纬线暗示（地球/Atlas） -->
  <ellipse cx="0" cy="0" rx="28" ry="43" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="0" cy="0" rx="43" ry="20" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.12" transform="rotate(-15)"/>

  <!-- 肠道轮廓 — 简化结肠路径 -->
  <path
    fill="none"
    stroke="currentColor"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"
    d="
      M 14 32
      C 14 24, 16 18, 16 10
      C 16 2, 18 -4, 16 -10
      L 16 -18
      C 16 -26, 10 -30, 0 -30
      C -10 -30, -16 -26, -16 -18
      L -16 -10
      C -18 -4, -16 2, -16 10
      C -16 18, -14 24, -14 32
    "
  />

  <!-- 肠道内绒毛纹理 -->
  <path fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.25"
    d="M 10 28 C 10 22, 11 16, 11 10 C 11 4, 12 -2, 11 -8 L 11 -16 C 11 -22, 7 -25, 0 -25 C -7 -25, -11 -22, -11 -16 L -11 -8 C -12 -2, -11 4, -11 10 C -11 16, -10 22, -10 28"/>

  <!-- 微生物菌群 — 球菌 (Cocci) -->
  <circle cx="-4" cy="-22" r="2.8" fill="currentColor" opacity="0.7"/>
  <circle cx="5" cy="-16" r="2.0" fill="currentColor" opacity="0.55"/>
  <circle cx="-7" cy="-10" r="2.4" fill="currentColor" opacity="0.65"/>
  <circle cx="8" cy="-4" r="1.6" fill="currentColor" opacity="0.45"/>
  <circle cx="-3" cy="2" r="2.6" fill="currentColor" opacity="0.6"/>
  <circle cx="6" cy="10" r="1.8" fill="currentColor" opacity="0.5"/>
  <circle cx="-6" cy="16" r="2.2" fill="currentColor" opacity="0.55"/>
  <circle cx="3" cy="24" r="1.4" fill="currentColor" opacity="0.4"/>

  <!-- 微生物菌群 — 杆菌 (Bacilli) -->
  <rect x="-2" y="-14" width="5.5" height="1.8" rx="0.9" fill="currentColor" opacity="0.5" transform="rotate(25, 0, -13)"/>
  <rect x="1" y="6" width="4.5" height="1.6" rx="0.8" fill="currentColor" opacity="0.45" transform="rotate(-30, 3, 7)"/>
  <rect x="-8" y="4" width="4" height="1.5" rx="0.75" fill="currentColor" opacity="0.4" transform="rotate(15, -6, 5)"/>
  <rect x="2" y="18" width="5" height="1.6" rx="0.8" fill="currentColor" opacity="0.35" transform="rotate(-15, 4, 19)"/>

  <!-- 散布在肠道外的微生物 — 代表菌群扩散 -->
  <circle cx="28" cy="-18" r="1.5" fill="currentColor" opacity="0.2"/>
  <circle cx="-30" cy="8" r="1.8" fill="currentColor" opacity="0.18"/>
  <circle cx="32" cy="14" r="1.2" fill="currentColor" opacity="0.15"/>
  <circle cx="-26" cy="-24" r="1.4" fill="currentColor" opacity="0.2"/>
  <circle cx="24" cy="26" r="1.6" fill="currentColor" opacity="0.17"/>
  <circle cx="-32" cy="-10" r="1.0" fill="currentColor" opacity="0.13"/>

  <!-- 连接线 — 菌群网络关系 -->
  <line x1="-4" y1="-22" x2="5" y2="-16" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
  <line x1="5" y1="-16" x2="-7" y2="-10" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
  <line x1="-7" y1="-10" x2="8" y2="-4" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
  <line x1="-3" y1="2" x2="6" y2="10" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
  <line x1="6" y1="10" x2="-6" y2="16" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
</svg>
