<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" id="logo" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Gut Microbiome Atlas</title>
  <desc id="logo-desc">A circular emblem with a ZW-shaped intestinal tract and microbial colonies</desc>

  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="currentColor" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gut-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- 外圈 — 简洁双层 -->
  <circle cx="0" cy="0" r="47" fill="none" stroke="url(#ring-grad)" stroke-width="1.2"/>
  <circle cx="0" cy="0" r="44" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>

  <!-- ZW 形肠道 — 粗壮圆润，3个弯 -->
  <path
    fill="none"
    stroke="url(#gut-grad)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="
      M 18,-36
      C 6,-38 -8,-34 -14,-26
      C -20,-18 -14,-10 0,-8
      C 14,-6 26,-2 28,6
      C 30,14 20,20 6,24
      C -8,28 -18,30 -18,36
      C -18,40 -10,42 0,40
      C 10,38 22,36 28,40
    "
  />

  <!-- 内侧轮廓线 — 肠壁厚度感 -->
  <path
    fill="none"
    stroke="currentColor"
    stroke-width="0.8"
    stroke-linecap="round"
    opacity="0.15"
    d="
      M 16,-32
      C 6,-34 -4,-30 -9,-24
      C -14,-18 -10,-12 2,-10
      C 14,-8 22,-4 24,4
      C 26,12 18,16 6,20
      C -6,24 -14,26 -14,32
      C -14,35 -8,37 0,36
      C 8,35 18,33 24,36
    "
  />

  <!-- 微生物菌落 — 沿肠道的圆点 -->
  <circle cx="4" cy="-34" r="2.8" fill="currentColor" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.35;0.55" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-8" cy="-12" r="2.4" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="2" r="2.6" fill="currentColor" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.4;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-4" cy="22" r="2.2" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.32;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="14" cy="39" r="2.0" fill="currentColor" opacity="0.45"/>

  <!-- 菌群网络连线 -->
  <g opacity="0.1" stroke="currentColor" stroke-width="0.5">
    <line x1="4" y1="-34" x2="-8" y2="-12"/>
    <line x1="-8" y1="-12" x2="18" y2="2"/>
    <line x1="18" y1="2" x2="-4" y2="22"/>
    <line x1="-4" y1="22" x2="14" y2="39"/>
  </g>

  <!-- 散布微粒 — 肠道外环境 -->
  <circle cx="34" cy="-18" r="1.0" fill="currentColor" opacity="0.12"/>
  <circle cx="-30" cy="10" r="1.2" fill="currentColor" opacity="0.1"/>
  <circle cx="32" cy="22" r="0.8" fill="currentColor" opacity="0.08"/>
  <circle cx="-26" cy="-20" r="0.9" fill="currentColor" opacity="0.1"/>

  <!-- 底部装饰弧 -->
  <path d="M -30 38 Q 0 46, 30 38" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
</svg>
